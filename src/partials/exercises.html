<section class="container section exercises" data-exercises-section>
  <div class="exercises-header">
    <h2 class="exercises-title" data-exercises-title-text>
      Exercises
      <span class="exercises-slash hidden" data-exercises-slash>/</span>
      <span
        class="exercises-link hidden"
        data-exercises-selected-category
      ></span>
    </h2>
    <div class="exercises-filters">
      <div class="exercises-search-form hidden" data-exercises-search>
        <load src="/partials/components/search-form.html" />
      </div>
      <ul class="exercises-categories" data-exercises-categories></ul>
    </div>
  </div>

  <div class="exercises-content">
    <aside class="exercises-sidebar" aria-label="Quote of the day">
      <div class="favor-quote-container">
        <div class="favor-quote-icon">
          <svg width="18" height="20">
            <use href="./img/sprite.svg#icon-running-stick"></use>
          </svg>
        </div>
        <load src="/partials/components/quote.html" />
      </div>
      <load src="/partials/components/favor-info.html" />
    </aside>
    <div class="exercises-main">
      <ul class="exercises-list" data-exercises-list></ul>
      <load src="/partials/components/exercises-workout-item-template.html" />
    </div>
  </div>
</section>
