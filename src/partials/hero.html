<!-- Hero -->
<section class="hero">
  <div class="container">
    <div class="title-wrapper">
      <h1 class="hero-title">
        <svg
          class="hero-title-icon"
          width="32"
          height="32"
          aria-hidden="true"
          focusable="false"
        >
          <use href="./img/sprite.svg#icon-sun"></use></svg
        >Get <i>Body</i> in shape, Stay healthy
      </h1>
      <p class="hero-subtitle">
        Transform your physique and embrace a healthier lifestyle with our
        comprehensive fitness and nutrition support.
      </p>
    </div>
    <picture class="hero-image-wrapper">
      <!-- Mobile -->
      <source
        media="(max-width: 767px)"
        srcset="./img/hero-mobile.avif 1x, ./img/hero-mobile@2x.avif 2x"
        type="image/avif"
        width="335"
        height="460"
      />
      <source
        media="(max-width: 767px)"
        srcset="./img/hero-mobile.webp 1x, ./img/hero-mobile@2x.webp 2x"
        type="image/webp"
        width="335"
        height="460"
      />

      <!-- Tablet -->
      <source
        media="(min-width: 768px) and (max-width: 1439px)"
        srcset="./img/hero-tablet.avif 1x, ./img/hero-tablet@2x.avif 2x"
        type="image/avif"
        width="704"
        height="550"
      />
      <source
        media="(min-width: 768px) and (max-width: 1439px)"
        srcset="./img/hero-tablet.webp 1x, ./img/hero-tablet@2x.webp 2x"
        type="image/webp"
        width="704"
        height="550"
      />

      <!-- Desktop -->
      <source
        media="(min-width: 1440px)"
        srcset="./img/hero-desktop.avif 1x, ./img/hero-desktop@2x.avif 2x"
        type="image/avif"
        width="1376"
        height="350"
      />
      <source
        media="(min-width: 1440px)"
        srcset="./img/hero-desktop.webp 1x, ./img/hero-desktop@2x.webp 2x"
        type="image/webp"
        width="1376"
        height="350"
      />

      <img
        src="./img/hero-desktop.webp"
        alt="Two girls are exercising in the fresh air"
        width="335"
        height="460"
        loading="eager"
        decoding="async"
        fetchpriority="high"
        class="hero-image"
      />
    </picture>
    <div class="tags-wrapper">
      <picture class="tags-img-wrapper">
        <source
          srcset="
            data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxIDEiLz4=
          "
          media="(max-width: 1023px)"
        />
        <source
          srcset="./img/tags-img.avif 1x, ./img/tags-img@2x.avif 2x"
          media="(min-width: 1024px)"
          type="image/avif"
        />
        <img
          src="./img/tags-img.jpg"
          srcset="./img/tags-img.jpg 1x, ./img/tags-img@2x.jpg 2x"
          loading="lazy"
          decoding="async"
          alt="Two people doing a partner yoga balance exercise while standing on one leg on the grass"
          class="tags-img"
        />
      </picture>
      <ul class="pill-list">
        <li class="pill">#Sport</li>
        <li class="pill">#Healthy</li>
        <li class="pill">#Workout</li>
        <li class="pill">#Diet</li>
      </ul>
    </div>
  </div>
</section>
