<div class="workout-card" data-workout-id="{=$id}">
  <!-- Верхня панель: бейдж WORKOUT, кнопка видалення та кнопка Start -->
  <div class="workout-header">
    <div class="workout-badge-wrap">
      <div class="workout-badge">Workout</div>

      <!-- Кнопка-іконка для видалення вправи з улюблених -->
      <button
        class="workout-btn-delete"
        type="button"
        aria-label="Delete workout"
        data-action="delete"
      >
        <svg class="delete-icon" width="16" height="16">
          <use href="img/sprite.svg#icon-trash"></use>
        </svg>
      </button>
    </div>

    <!-- Кнопка Start праворуч (використовує ваш синтаксис компонента) -->
    <button
      class="workout-btn-start"
      type="button"
      aria-label="Start workout"
      data-action="start"
    >
      Start
      <svg class="btn-icon" width="20" height="20">
        <use href="img/sprite.svg#icon-arrow-right"></use>
      </svg>
    </button>
  </div>

  <!-- Назва вправи з іконкою людини, що біжить -->
  <div class="workout-title-container">
    <div class="workout-icon-wrap">
      <svg class="workout-icon" width="16" height="16">
        <use href="img/sprite.svg#icon-run"></use>
      </svg>
    </div>
    <h3 class="workout-title">{=$title}</h3>
  </div>

 <!-- Технічні характеристики вправи -->
  <ul class="workout-info-list">
    <li class="workout-info-item">
      <span class="info-label">Burned calories:</span>
      <span class="info-value">{=$calories} / 3 min</span>
    </li>
    <li class="workout-info-item">
      <span class="info-label">Body part:</span>
      <span class="info-value">{=$bodyPart}</span>
    </li>
    <li class="workout-info-item">
      <span class="info-label">Target:</span>
      <span class="info-value">{=$target}</span>
    </li>
  </ul>
</div>
</div>
