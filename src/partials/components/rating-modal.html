<!-- #region Rating modal -->
<div class="modal-overlay" data-rating-modal>
  <div
    class="modal rating-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="rating-modal-title"
  >
    <button
      class="modal-close"
      type="button"
      aria-label="Close"
      data-modal-close
    >
      <svg class="modal-close-icon" width="24" height="24">
        <use href="img/sprite.svg#icon-x"></use>
      </svg>
    </button>

    <form class="rating-form" data-role="rating-form" novalidate>
      <div class="rating-header">
        <p class="rating-form-title" id="rating-modal-title">Rating</p>

        <div class="rating-stars-row">
          <span class="rating-value" data-role="rating-value">0.0</span>
          <div
            class="rating-stars"
            role="radiogroup"
            aria-label="Exercise rating"
          >
            <input
              class="rating-star-input visually-hidden"
              type="radio"
              name="rate"
              id="rate-5"
              value="5"
              required
            />
            <label class="rating-star-label" for="rate-5">
              <svg class="rating-star-icon" width="22" height="20">
                <use href="img/sprite.svg#icon-star"></use>
              </svg>
            </label>

            <input
              class="rating-star-input visually-hidden"
              type="radio"
              name="rate"
              id="rate-4"
              value="4"
              required
            />
            <label class="rating-star-label" for="rate-4">
              <svg class="rating-star-icon" width="22" height="20">
                <use href="img/sprite.svg#icon-star"></use>
              </svg>
            </label>

            <input
              class="rating-star-input visually-hidden"
              type="radio"
              name="rate"
              id="rate-3"
              value="3"
              required
            />
            <label class="rating-star-label" for="rate-3">
              <svg class="rating-star-icon" width="22" height="20">
                <use href="img/sprite.svg#icon-star"></use>
              </svg>
            </label>

            <input
              class="rating-star-input visually-hidden"
              type="radio"
              name="rate"
              id="rate-2"
              value="2"
              required
            />
            <label class="rating-star-label" for="rate-2">
              <svg class="rating-star-icon" width="22" height="20">
                <use href="img/sprite.svg#icon-star"></use>
              </svg>
            </label>

            <input
              class="rating-star-input visually-hidden"
              type="radio"
              name="rate"
              id="rate-1"
              value="1"
              required
            />
            <label class="rating-star-label" for="rate-1">
              <svg class="rating-star-icon" width="22" height="20">
                <use href="img/sprite.svg#icon-star"></use>
              </svg>
            </label>
          </div>
        </div>
      </div>

      <label class="visually-hidden" for="rating-email">Email</label>
      <input
        class="input"
        type="email"
        id="rating-email"
        name="email"
        placeholder="Email"
        required
        pattern="^[^\s@]+@[^\s@]+\.[^\s@]{2,}$"
      />

      <label class="visually-hidden" for="rating-review">Your comment</label>
      <textarea
        class="input textarea"
        id="rating-review"
        name="review"
        placeholder="Your comment"
        required
      ></textarea>

      <p class="rating-form-error" data-role="rating-error" hidden></p>

      <button
        class="btn light width-100-percent"
        type="submit"
        data-role="rating-submit"
      >
        Send
      </button>
    </form>
  </div>
</div>
<!-- #endregion Rating modal -->
