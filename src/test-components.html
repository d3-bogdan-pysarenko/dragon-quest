<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Energy Components</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
      integrity="sha512-q6WgHqiHlKyOqslT/lgBgodhd03Wp4BEqKeW6nNtlOY4quzyG3VoQKFrieaCeSnuVseNKRGpGeDU3qPmabCANg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <load
      src="./partials/header.html"
      icon-path="img/sprite.svg#icon-logo-text"
    />

    <main>
      <div
        class="container"
        style="margin-bottom: 20px; padding-top: 20px; padding-bottom: 20px"
      >
        <load
          src="./partials/components/socials.html"
          addition-classes="light"
        />
      </div>

      <div
        class="container"
        style="
          margin-bottom: 20px;
          background-color: var(--color-ink);
          padding-top: 20px;
          padding-bottom: 20px;
        "
      >
        <load
          src="./partials/components/socials.html"
          addition-classes="dark"
        />
      </div>

      <div
        class="container"
        style="
          margin-bottom: 20px;
          background-color: var(--color-ink);
          padding-top: 20px;
          padding-bottom: 20px;
        "
      >
        <load
          src="./partials/components/button-icon.html"
          class="btn light"
          label="Add to favorites"
          type="button"
          icon-id="icon-heart"
        />
        <load
          src="./partials/components/button-icon.html"
          class="btn dark"
          label="Add to favorites"
          type="button"
          icon-id="icon-heart"
        />
        <load
          src="./partials/components/button-icon.html"
          class="btn light"
          label="Remove from favorites"
          type="button"
          icon-id="icon-trash"
        />
        <load
          src="./partials/components/button-icon.html"
          class="btn dark"
          label="Remove from favorites"
          type="button"
          icon-id="icon-trash"
        />
        <button class="btn dark">Give a rating</button>
        <button class="btn light">Give a rating</button>
      </div>

      <div
        class="container"
        style="margin-bottom: 20px; padding-top: 20px; padding-bottom: 20px"
      >
        <load
          src="./partials/components/input-btn.html"
          name="search"
          label="Search"
          icon-id="icon-search"
          type="text"
          class="light"
        />
      </div>

      <div
        class="container"
        style="margin-bottom: 20px; padding-top: 20px; padding-bottom: 20px"
      >
        <load src="./partials/components/search-form.html" />
      </div>
    </main>

    <load src="./partials/footer.html" />
  </body>
</html>
